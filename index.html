<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVSHOP - Игровой маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dark-theme">
    <!-- Шапка -->
    <header class="main-header">
        <div class="container">
            <div class="header-flex">
                <a href="index.html" class="logo-link">
                    <img src="img/logo.png" alt="IVSHOP" class="logo">
                </a>
                <div class="header-actions">
                    <a href="balance.html" class="balance-link" id="header-balance">0 ₽</a>
                    <a href="profile.html" class="user-profile">
                    <i class="fas fa-user"></i>
                </a>
                <button id="theme-toggle" class="theme-btn">
                <i class="fas fa-sun"></i>
                </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Основной контент -->
    <main>
        <section class="hero">
            <div class="container">
                <div class="hero-content">
                    <h1>IVSHOP</h1>
                    <div class="rating">
                        <span class="stars">★★★★★</span>
                        <span class="reviews">1 отзыв</span>
                    </div>
                    <p class="tagline">Купите игры, аккаунты и подписки по лучшим ценам</p>
                </div>
            </div>
        </section>

        <!-- Категории -->
        <section class="categories-section">
            <div class="container">
                <h2 class="section-title">Популярные категории</h2>
                <div class="categories-grid">
                    <a href="#games" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-gamepad"></i>
                        </div>
                        <h3>Игры</h3>
                        <span class="count">389 товаров</span>
                    </a>
                    
                    <a href="#accounts" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-user-circle"></i>
                        </div>
                        <h3>Аккаунты</h3>
                        <span class="count">215 товаров</span>
                    </a>
                    
                    <a href="#mobile" class="category-card">
                        <div class="category-icon">
                            <i class="fas fa-mobile-alt"></i>
                        </div>
                        <h3>Мобильные игры</h3>
                        <span class="count">285 товаров</span>
                    </a>
                </div>
            </div>
        </section>

        <!-- Лента игр -->
        <section class="games-feed" id="games">
            <div class="container">
                <h2 class="section-title">Топ игр</h2>
                <div class="games-grid" id="games-grid-container">
                    <!-- Сюда загрузятся игры -->
                </div>
            </div>
        </section>

        <!-- Аккаунты -->
        <section class="accounts-section" id="accounts">
            <div class="container">
                <h2 class="section-title">Популярные аккаунты</h2>
                <div class="accounts-grid" id="accounts-grid-container">
                    <!-- Сюда загрузятся аккаунты -->
                </div>
            </div>
        </section>
        
    <!-- Подвал -->
    <footer class="main-footer">
        <div class="container">
            <p>© 2026 IVSHOP. Все права защищены.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
